# 占位示例：复制到项目内 client/embed；勿提交真实密钥。
doc: 占位示例，不含真实凭据。
publicBasePlaceholder: https://your-bucket.example.com
# 桶内对象 key 模板，*project* 随项目名替换，与 project 字段一致
cosRuleConfigPath: /cosRuleConfig/*project*.media.yaml
# 与 OSS 上同路径 YAML 中 cosRuleConfigVersion 对齐；发布新规则时二者同步递增
cosRuleConfigVersion: 0
# 前后端轮询检查版本号的间隔（秒），≥5
cosRuleConfigCheckTime: 60
imageDisplayCacheTtlMs: 300000
mediaConfigTtlMs: 300000
proxyAllowedPrefixes:
  - front_page_config/
productMedia:
  dirPattern: front_page_config/product/%d/
  mainPageStem: main_page
  mainPageExts:
    - .jpg
    - .jpeg
    - .png
    - .webp
    - .gif
  uploadSlots:
    - main_page
    - intro
  mainPageKeyTpl: front_page_config/product/%d/main_page<ext>
