project: vino
cosRuleConfigPath: /cosRuleConfig/*project*.media.yaml
cosRuleConfigVersion: 0
cosRuleConfigCheckTime: 60
cloudProvider: tencent
# 与 services.CosBase() 一致的桶 HTTPS 公网根（无尾斜杠）；三端以 GET /api/media/cos-config 返回为准，本处为真源
ossPublicBaseDefault: https://itsyourturnmy-1256887166.cos.ap-singapore.myqcloud.com
imageDisplayCacheTtlMs: 300000
mediaConfigTtlMs: 300000
cosProxyAllowedPrefixes:
  - vino/uploads/
  - vino/main_page/
  - vino/main_animation/
  - vino/items/
  - front_page_config/
productMediaNote: DeviceGuide 等路径见后端 embed catalog 与三端 cosMedia

# FrontPageConfig：首页轮播等（客户端按 Root + 子目录 + id 拼 COS URL 直拉）
frontPageConfig:
  Root: front_page_config

  # 首页轮播图（Root 下相对路径模板）
  # 可用占位符：{id}（轮播图 id）, {lang}（zh/en）
  HomepageCarouselTemplate: Homepagecarousel/{id}_{lang}.jpg

  # 商品媒体（Root 下相对路径模板）
  # 可用占位符：{product_id}（device_guides.id）, {lang}（zh/en）
  ProductIconTemplate: product/{product_id}/icon_{lang}.jpg
  ProductCoverTemplate: product/{product_id}/banner_page_{lang}.jpg
  ProductCoverThumbTemplate: product/{product_id}/cover_thumbnail_{lang}.jpg