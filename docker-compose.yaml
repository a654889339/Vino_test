version: '3.8'

services:
  vino-mysql:
    image: mysql:8.0
    container_name: vino-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: vino_secret_2024
      MYSQL_DATABASE: vino_db
      MYSQL_CHARSET: utf8mb4
    ports:
      - "3308:3306"
    volumes:
      - vino-mysql-data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  vino-backend:
    build: ./backend
    container_name: vino-backend
    restart: always
    ports:
      - "5202:5202"
    environment:
      NODE_ENV: production
      PORT: 5202
      DB_HOST: vino-mysql
      DB_PORT: 3306
      DB_NAME: vino_db
      DB_USER: root
      DB_PASSWORD: vino_secret_2024
      JWT_SECRET: vino_jwt_production_secret_2024
      EMAIL_ENABLED: "true"
      EMAIL_HOST: smtp.qq.com
      EMAIL_PORT: "587"
      EMAIL_USERNAME: 654889339@qq.com
      EMAIL_PASSWORD: jvwuiqxrfjmibcdb
      EMAIL_FROM: 654889339@qq.com
      EMAIL_FROM_NAME: Vino服务
      WECHAT_APPID: wxf6fdff25c117e86d
      WECHAT_SECRET: ${WECHAT_SECRET:-}
      ALIPAY_APPID: ${ALIPAY_APPID:-}
      ALIPAY_PRIVATE_KEY: ${ALIPAY_PRIVATE_KEY:-}
      ALIPAY_PUBLIC_KEY: ${ALIPAY_PUBLIC_KEY:-}
      COS_SECRET_ID: ${COS_SECRET_ID:-}
      COS_SECRET_KEY: ${COS_SECRET_KEY:-}
    depends_on:
      vino-mysql:
        condition: service_healthy

  vino-frontend:
    build: ./frontend
    container_name: vino-frontend
    restart: always
    ports:
      - "5201:5201"
    depends_on:
      - vino-backend

volumes:
  vino-mysql-data:
